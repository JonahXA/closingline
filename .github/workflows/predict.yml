name: Daily forecasts

on:
  schedule:
    - cron: "0 11 * * *"  # 11:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache match data
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/xg
            data/xg_players
          key: football-data-${{ github.run_id }}
          restore-keys: football-data-

      - name: Install
        run: pip install -e .

      - name: Ingest data
        run: closingline ingest

      - name: Issue forecasts
        run: closingline predict

      - name: Log and settle paper bets
        run: |
          closingline paper
          closingline paper --settle || true

      - name: Commit new forecasts
        run: |
          git config user.name "closingline-bot"
          git config user.email "actions@github.com"
          # paper/ and predictions/ may not exist yet (no fixtures in the
          # off-season). A missing pathspec aborts `git add` with exit 128 —
          # that silently killed this job for three days in July 2026 — so
          # ensure both exist before staging.
          mkdir -p predictions paper
          git add predictions/ paper/
          if ! git diff --cached --quiet; then
            git commit -m "Forecasts issued $(date -u +%F)"
            git push
          fi

      # A silent failure here means missing pre-registered forecasts, which
      # cannot be backfilled honestly — so make breakage loud.
      - name: Open an issue if the run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily forecast run failed';
            const {data: open} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'pipeline',
            });
            const body = `Run [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed on ${new Date().toISOString().slice(0,10)}. Forecasts for today may be missing and cannot be backfilled without breaking pre-registration.`;
            if (open.some(i => i.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.find(i => i.title === title).number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['pipeline'],
              });
            }
